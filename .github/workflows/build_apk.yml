name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Kodu indir
        uses: actions/checkout@v4

      - name: Java kur
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Flutter kur
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'

      - name: Flutter projesi olustur
        run: flutter create --org com.akillitahta --project-name akilli_tahta proje

      - name: Dart dosyalarini kopyala
        run: cp -r lib/* proje/lib/

      - name: pubspec kopyala
        run: cp pubspec.yaml proje/pubspec.yaml

      - name: AndroidManifest kopyala
        run: |
          mkdir -p proje/android/app/src/main
          cp android/app/src/main/AndroidManifest.xml proje/android/app/src/main/AndroidManifest.xml

      - name: build.gradle duzelt
        run: |
          cat > proje/android/app/build.gradle << 'EOF'
          plugins {
              id "com.android.application"
              id "kotlin-android"
              id "dev.flutter.flutter-gradle-plugin"
          }
          android {
              namespace "com.akillitahta.akilli_tahta"
              compileSdk 34
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_1_8
                  targetCompatibility JavaVersion.VERSION_1_8
              }
              kotlinOptions {
                  jvmTarget = '1.8'
              }
              defaultConfig {
                  applicationId "com.akillitahta.akilli_tahta"
                  minSdk 21
                  targetSdk 34
                  versionCode 1
                  versionName "1.0"
              }
              buildTypes {
                  release {
                      signingConfig signingConfigs.debug
                  }
              }
          }
          flutter {
              source '../..'
          }
          EOF

      - name: Paketleri indir
        run: cd proje && flutter pub get

      - name: APK derle
        run: cd proje && flutter build apk --release

      - name: APK kaydet
        uses: actions/upload-artifact@v4
        with:
          name: akilli-tabela-apk
          path: proje/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
