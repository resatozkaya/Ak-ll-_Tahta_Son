name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Kodu indir
        uses: actions/checkout@v4

      - name: Java kur
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Flutter kur
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'

      - name: Flutter projesi olustur
        run: flutter create --org com.akillitahta --project-name akilli_tahta proje

      - name: Kendi dosyalarimi kopyala
        run: |
          cp -r lib/* proje/lib/
          cp pubspec.yaml proje/pubspec.yaml

      - name: Paketleri indir
        run: cd proje && flutter pub get

      - name: APK derle
        run: cd proje && flutter build apk --release

      - name: APK kaydet
        uses: actions/upload-artifact@v4
        with:
          name: akilli-tabela-apk
          path: proje/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
