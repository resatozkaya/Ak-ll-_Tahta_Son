name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Kodu indir
        uses: actions/checkout@v4

      - name: Java kur
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Flutter kur
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'

      - name: pubspec.yaml'i lib klasorune kopyala
        run: cp pubspec.yaml lib/pubspec.yaml

      - name: Paketleri indir
        run: cd lib && flutter pub get

      - name: APK derle
        run: cd lib && flutter build apk --release

      - name: APK kaydet
        uses: actions/upload-artifact@v4
        with:
          name: akilli-tabela-apk
          path: lib/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
